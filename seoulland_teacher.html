<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울랜드 과학 탐험대 - 교사 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc; 
        }
        .font-jua { font-family: 'Jua', sans-serif; }
        .screen { display: none !important; min-height: 100vh; }
        .screen.active { display: flex !important; flex-direction: column; }
        
        .progress-bar-striped {
            background-image: linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.15) 50%,rgba(255,255,255,.15) 75%,transparent 75%,transparent);
            background-size: 1rem 1rem;
        }
        .live-indicator {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="screen-login" class="screen active items-center justify-center p-4 bg-[#fff1f2] bg-[radial-gradient(#fecdd3_2px,transparent_2px)] bg-[size:24px_24px]">
        <div class="bg-white/95 backdrop-blur-sm p-10 rounded-[2rem] shadow-2xl max-w-sm w-full text-center border-4 border-rose-100">
            <div class="text-6xl mb-4 animate-bounce">👨‍🏫</div>
            <h1 class="font-jua text-4xl text-rose-600 mb-2">교사 대시보드</h1>
            <p class="text-slate-500 font-bold mb-8">아이들의 탐험을 지켜보세요!</p>
            
            <input type="password" id="input-pw" class="w-full px-5 py-4 rounded-xl border-2 border-slate-200 focus:border-rose-500 focus:ring-4 focus:ring-rose-100 outline-none transition mb-6 text-center font-bold text-lg" placeholder="접속 비밀번호">
            <button id="btn-login" class="w-full bg-gradient-to-r from-rose-500 to-pink-500 text-white font-jua text-2xl py-4 rounded-xl shadow-[0_6px_0_#be123c] active:translate-y-[6px] active:shadow-none transition-all">접속하기</button>
            <p id="login-error" class="text-rose-500 font-bold text-sm mt-4 hidden">비밀번호가 일치하지 않습니다.</p>
        </div>
    </div>

    <div id="screen-dashboard" class="screen">
        <nav class="bg-gradient-to-r from-slate-900 to-slate-800 text-white p-4 sticky top-0 z-20 shadow-lg border-b-4 border-rose-500">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🎢</span>
                    <h1 class="font-jua text-2xl tracking-wide">서울랜드 과학 탐험대 현황판</h1>
                </div>
                <div class="flex items-center gap-4 text-sm font-bold bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                    <div class="w-3 h-3 bg-red-500 rounded-full live-indicator"></div>
                    <span class="text-slate-200">실시간 연동 중 (자동 갱신)</span>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 py-8 space-y-8 w-full flex-1">
            <div id="db-warning" class="hidden bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">⚠️</div>
                    <div class="ml-3">
                        <p class="text-sm text-amber-700 font-bold">클라우드 DB 연결 오류! Firebase 설정을 확인하세요.</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 text-6xl opacity-10">👥</div>
                    <p class="text-slate-500 text-sm font-bold mb-1">참여 중인 모둠</p>
                    <p class="text-4xl font-black text-slate-800"><span id="stat-groups">0</span><span class="text-lg text-slate-400 ml-1 font-bold">팀</span></p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 text-6xl opacity-10">🔖</div>
                    <p class="text-slate-500 text-sm font-bold mb-1">찍힌 도장 총합</p>
                    <p class="text-4xl font-black text-rose-600"><span id="stat-missions">0</span><span class="text-lg text-slate-400 ml-1 font-bold">개</span></p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 text-6xl opacity-10">🍿</div>
                    <p class="text-slate-500 text-sm font-bold mb-1">교환권 획득 (5개+)</p>
                    <p class="text-4xl font-black text-amber-500"><span id="stat-amulets">0</span><span class="text-lg text-slate-400 ml-1 font-bold">팀</span></p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 text-6xl opacity-10">🚀</div>
                    <p class="text-slate-500 text-sm font-bold mb-1">팀당 평균 달성률</p>
                    <p class="text-4xl font-black text-purple-600"><span id="stat-avg">0.0</span><span class="text-lg text-slate-400 ml-1 font-bold">개</span></p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 lg:col-span-1 h-fit">
                    <h2 class="font-jua text-2xl text-slate-800 mb-6 flex items-center gap-2">📊 미션별 진행률</h2>
                    <div class="space-y-5" id="mission-stats-container"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 lg:col-span-2">
                    <div class="flex justify-between items-end mb-6">
                        <h2 class="font-jua text-2xl text-slate-800 flex items-center gap-2">🏃‍♂️ 우리반 탐험대 현황</h2>
                        <span class="text-sm font-bold text-rose-500 bg-rose-50 px-3 py-1 rounded-full">도장 많은 순 🏆</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="team-list-container"></div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- [선생님의 Firebase 설정 적용] ---
    const firebaseConfig = {
        apiKey: "AIzaSyBqe59Dh5OjerwcK87Mp_HPH8MGsON0icE",
        authDomain: "seoulland-f090b.firebaseapp.com",
        projectId: "seoulland-f090b",
        storageBucket: "seoulland-f090b.firebasestorage.app",
        messagingSenderId: "675549898278",
        appId: "1:675549898278:web:d3dc82eea8688d990be8e7"
    };

    const MISSIONS = [
        "블랙홀 2000", "은하열차 888", "킹바이킹", 
        "급류타기", "샷드롭", "엑스플라이어", 
        "앨리스 원더하우스", "쥬라기랜드", "기상 관측가"
    ];

    const screenLogin = document.getElementById('screen-login');
    const screenDash = document.getElementById('screen-dashboard');
    let db, auth;
    const appId = 'seoulland-app';

    // 1. Firebase 초기화
    try {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        signInAnonymously(auth).catch(e => {
            console.error("인증 에러:", e);
            document.getElementById('db-warning').classList.remove('hidden');
        });
    } catch(e) { 
        console.error("Firebase 초기화 에러", e); 
        document.getElementById('db-warning').classList.remove('hidden');
    }

    // 2. 로그인 이벤트
    document.getElementById('btn-login').addEventListener('click', () => {
        const pw = document.getElementById('input-pw').value;
        if (pw === 'science2025') {
            screenLogin.classList.remove('active');
            screenDash.classList.add('active');
            
            if (auth) {
                onAuthStateChanged(auth, (user) => {
                    if (user) startRealtimeSync();
                });
            }
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    });

    document.getElementById('input-pw').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // 3. 실시간 동기화
    function startRealtimeSync() {
        if (!db) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'groups');
        
        onSnapshot(q, (snapshot) => {
            const groups = [];
            snapshot.forEach((doc) => {
                groups.push(doc.data());
            });
            renderDashboard(groups);
        });
    }

    // 4. 대시보드 렌더링
    function renderDashboard(groups) {
        let totalStamps = 0;
        let amuletCount = 0;
        let missionCounts = new Array(9).fill(0);

        groups.forEach(g => {
            const stamps = g.stamps || {};
            const keys = Object.keys(stamps);
            const count = keys.length;
            totalStamps += count;
            if (count >= 5) amuletCount++;
            keys.forEach(k => {
                const id = parseInt(k);
                if(id >= 0 && id < 9) missionCounts[id]++;
            });
        });

        document.getElementById('stat-groups').textContent = groups.length;
        document.getElementById('stat-missions').textContent = totalStamps;
        document.getElementById('stat-amulets').textContent = amuletCount;
        document.getElementById('stat-avg').textContent = groups.length > 0 ? (totalStamps / groups.length).toFixed(1) : "0.0";

        const missionContainer = document.getElementById('mission-stats-container');
        missionContainer.innerHTML = '';
        MISSIONS.forEach((name, i) => {
            const count = missionCounts[i];
            const percent = groups.length > 0 ? Math.round((count / groups.length) * 100) : 0;
            missionContainer.innerHTML += `
                <div>
                    <div class="flex justify-between text-sm mb-1.5">
                        <span class="font-bold text-slate-700">${i+1}. ${name}</span>
                        <span class="font-bold text-rose-500">${count}팀 (${percent}%)</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div class="bg-gradient-to-r from-rose-400 to-pink-500 h-3 rounded-full progress-bar-striped" style="width: ${percent}%"></div>
                    </div>
                </div>`;
        });

        const teamContainer = document.getElementById('team-list-container');
        teamContainer.innerHTML = '';
        groups.sort((a, b) => Object.keys(b.stamps||{}).length - Object.keys(a.stamps||{}).length);

        if(groups.length === 0) {
            teamContainer.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">아직 탐험을 시작한 모둠이 없습니다. 👀</div>';
        }

        groups.forEach(g => {
            const stamps = g.stamps || {};
            const stampCount = Object.keys(stamps).length;
            const isAmulet = stampCount >= 5;
            let gridHtml = '';
            for(let i=0; i<9; i++) {
                gridHtml += `<div class="aspect-square rounded-md flex items-center justify-center text-xs ${stamps[i] ? 'bg-rose-500 text-white font-bold' : 'bg-slate-100 text-slate-300'}">${i+1}</div>`;
            }

            let answersHtml = '';
            if (g.answers) {
                answersHtml += '<div class="mt-4 border-t border-slate-100 pt-3 space-y-2">';
                for (const [mId, ans] of Object.entries(g.answers)) {
                    if (ans.trim()) {
                        answersHtml += `<div class="bg-slate-50 p-2 rounded-lg text-sm">
                            <p class="text-[10px] font-black text-rose-400">${MISSIONS[mId]}</p>
                            <p class="text-slate-700">${ans}</p>
                        </div>`;
                    }
                }
                answersHtml += '</div>';
            }

            teamContainer.innerHTML += `
                <div class="p-5 rounded-2xl border-2 ${isAmulet ? 'border-amber-400 bg-amber-50/20' : 'border-slate-100 bg-white'} relative flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-black text-rose-500 bg-rose-50 px-2 py-0.5 rounded block mb-1 w-max">${g.cls}</span>
                            <h3 class="font-jua text-2xl text-slate-800">${g.group}</h3>
                            <span class="text-sm font-bold text-slate-500">기록자: ${g.name}</span>
                        </div>
                        <span class="px-2 py-1 rounded-lg text-sm font-black bg-slate-50 border border-slate-200">🔖 ${stampCount}/9</span>
                    </div>
                    <div class="grid grid-cols-9 gap-1.5 mb-3">${gridHtml}</div>
                    ${answersHtml}
                </div>`;
        });
    }
</script>
</body>
</html>
