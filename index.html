<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울랜드 과학 탐험대</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: #fff5f6;
            background-image: radial-gradient(#fecdd3 1.5px, transparent 1.5px);
            background-size: 30px 30px; /* 귀여운 도트 배경 */
        }
        .font-jua { font-family: 'Jua', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s ease-out; }
        
        /* 3D 버튼 효과 */
        .btn-push {
            transition: all 0.1s;
            box-shadow: 0 6px 0 #be123c;
        }
        .btn-push:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #be123c;
        }
        
        /* 미션 카드 애니메이션 */
        .mission-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .mission-card:active { transform: scale(0.95); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 텍스트 글로우 */
        .text-glow {
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.2);
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="screen-login" class="screen active min-h-screen flex items-center justify-center p-6">
        <div class="bg-white/90 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-8 border-rose-100 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-rose-200 rounded-full opacity-50"></div>
            <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-rose-100 rounded-full opacity-50"></div>
            
            <h1 class="font-jua text-5xl text-rose-500 text-center mb-2 text-glow">🎡 서울랜드</h1>
            <p class="font-jua text-2xl text-rose-400 text-center mb-10">과학 탐험대</p>
            
            <div class="space-y-6 relative z-10">
                <div class="group">
                    <label class="block text-sm font-black text-rose-400 mb-2 ml-1">몇 반이야? 👀</label>
                    <input type="text" id="input-cls" class="w-full px-6 py-4 rounded-2xl border-4 border-slate-50 focus:border-rose-300 outline-none transition-all text-lg font-bold" placeholder="예: 1반">
                </div>
                <div>
                    <label class="block text-sm font-black text-rose-400 mb-2 ml-1">모둠 이름 ⚡</label>
                    <input type="text" id="input-group" class="w-full px-6 py-4 rounded-2xl border-4 border-slate-50 focus:border-rose-300 outline-none transition-all text-lg font-bold" placeholder="예: 무적과학팀">
                </div>
                <div>
                    <label class="block text-sm font-black text-rose-400 mb-2 ml-1">기록 대표자 이름 ✍️</label>
                    <input type="text" id="input-name" class="w-full px-6 py-4 rounded-2xl border-4 border-slate-50 focus:border-rose-300 outline-none transition-all text-lg font-bold" placeholder="이름을 적어줘">
                </div>
                <button id="btn-start" disabled class="w-full bg-slate-300 text-white font-jua text-3xl py-5 rounded-2xl mt-4 transition-all">
                    연결 중...
                </button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen min-h-screen p-4 pb-24">
        <header class="bg-gradient-to-r from-rose-500 to-pink-500 rounded-[2rem] p-6 shadow-xl mb-8 flex justify-between items-center text-white border-b-8 border-rose-700/30">
            <div>
                <span id="display-cls" class="text-xs font-black bg-white/20 px-2 py-1 rounded-full"></span>
                <h2 id="display-group" class="font-jua text-3xl mt-1 tracking-tight"></h2>
            </div>
            <div class="bg-white/20 backdrop-blur-sm p-3 rounded-2xl text-center min-w-[80px]">
                <span class="text-[10px] font-black uppercase">Stamps</span>
                <p class="font-jua text-3xl leading-none"><span id="stamp-count">0</span><span class="text-lg">/9</span></p>
            </div>
        </header>

        <div id="mission-grid" class="grid grid-cols-1 gap-5">
            </div>
    </div>

    <div id="modal-mission" class="fixed inset-0 bg-rose-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[3rem] overflow-hidden shadow-2xl border-b-8 border-slate-200">
            <div id="modal-color" class="h-40 flex items-center justify-center text-7xl bg-gradient-to-b from-rose-50 to-white"></div>
            <div class="p-8">
                <h3 id="modal-title" class="font-jua text-4xl mb-4 text-slate-800"></h3>
                <div class="bg-rose-50/50 p-5 rounded-[1.5rem] mb-4 text-[15px] leading-relaxed text-slate-600 border-2 border-rose-100">
                    <p id="modal-desc" class="font-medium"></p>
                </div>
                <div id="modal-keywords" class="flex flex-wrap gap-2 mb-8"></div>
                
                <div class="bg-slate-50 p-5 rounded-[1.5rem] mb-8 border-2 border-slate-100 focus-within:border-rose-200 transition-colors">
                    <label class="block text-xs font-black text-rose-400 mb-2 ml-1 uppercase tracking-widest">Observation Record</label>
                    <textarea id="input-answer" class="w-full bg-transparent rounded-lg border-none focus:ring-0 p-0 text-md font-bold text-slate-700 placeholder:text-slate-300" rows="3" placeholder="여기에 너의 생각을 적어줘!"></textarea>
                </div>
                <div class="flex gap-4">
                    <button onclick="closeModal()" class="flex-1 py-5 font-black text-slate-400 hover:text-slate-600 transition-colors">닫기</button>
                    <button id="btn-complete" class="btn-push flex-[2] bg-rose-500 text-white font-jua text-2xl py-5 rounded-[1.5rem]">도장 찍기! 🔖</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqe59Dh5OjerwcK87Mp_HPH8MGsON0icE",
        authDomain: "seoulland-f090b.firebaseapp.com",
        projectId: "seoulland-f090b",
        storageBucket: "seoulland-f090b.firebasestorage.app",
        messagingSenderId: "675549898278",
        appId: "1:675549898278:web:d3dc82eea8688d990be8e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const MISSIONS = [
        { title: "블랙홀 2000", emoji: "🎢", desc: "높은 곳에 있는 물체는 아래로 내려올 수 있는 능력, 즉 '위치에너지'를 가지고 있어. 롤러코스터가 내려오면서 이 위치에너지가 빠르게 달리는 힘인 '운동에너지'로 바뀌는 거야.", keywords: ["위치에너지", "운동에너지", "에너지 전환"] },
        { title: "은하열차 888", emoji: "🚀", desc: "물체는 원래 하던 방향으로 계속 가려는 성질이 있는데, 이걸 '관성'이라고 해. 뒤집혀도 안 떨어지는 이유는 구심력이 중력보다 크기 때문이야.", keywords: ["관성", "구심력"] },
        { title: "킹바이킹", emoji: "⚓", desc: "진자는 크게 흔들리든 작게 흔들리든 한 번 왕복하는 시간이 거의 같아. 이걸 '등시성'이라고 해. 줄의 길이에만 왕복 시간이 달라져.", keywords: ["진자운동", "주기", "등시성"] },
        { title: "급류타기", emoji: "💦", desc: "움직이는 물체는 무거울수록, 빠를수록 충돌할 때 더 큰 힘을 만들어. 사람이 많이 탈수록 물이 더 멀리 튀는 원리가 여기 있어.", keywords: ["중력", "무게", "힘"] },
        { title: "샷드롭", emoji: "🗼", desc: "자유낙하를 하는 순간 발판이 내 발을 받쳐주는 힘이 사라지면서 몸이 둥둥 뜨는 것처럼 느껴지는데, 이걸 무중력 체험이라고 해.", keywords: ["중력", "자유낙하", "무중력"] },
        { title: "엑스플라이어", emoji: "🌀", desc: "회전할 때 중심 방향으로 당기는 힘이 '구심력'이야. 내 몸이 바깥으로 쏠리는 느낌은 직선으로 가려는 관성 때문이지.", keywords: ["관성", "구심력", "원운동"] },
        { title: "앨리스 원더하우스", emoji: "🃏", desc: "눈은 빛을 받아들일 뿐, 보는 것은 뇌가 해석하는 거야. 착시는 뇌의 예측이 의도적으로 빗나갔을 때 생기는 현상이야.", keywords: ["빛의 반사", "착시", "시각 처리"] },
        { title: "쥬라기랜드", emoji: "🦖", desc: "화석은 과거 생물의 흔적이야. 오랜 시간 동안 환경에 적응하며 생김새가 변해가는 '진화'의 증거를 찾아보자.", keywords: ["화석", "멸종", "진화"] },
        { title: "기상 관측가", emoji: "☁️", desc: "아스팔트가 많아지면 열을 많이 흡수해서 도시 온도가 주변보다 높아지는데, 이걸 '열섬 효과'라고 불러.", keywords: ["복사열", "열흡수", "열섬 효과"] }
    ];

    let currentGroup = { cls: '', group: '', name: '', stamps: {}, answers: {} };
    let currentMissionIdx = null;

    signInAnonymously(auth).then(() => {
        const btn = document.getElementById('btn-start');
        btn.disabled = false;
        btn.innerText = "탐험 시작하기! 🚀";
        btn.classList.replace('bg-slate-300', 'bg-rose-500');
        btn.classList.add('btn-push');
    });

    document.getElementById('btn-start').onclick = () => {
        const cls = document.getElementById('input-cls').value;
        const group = document.getElementById('input-group').value;
        const name = document.getElementById('input-name').value;
        if(!cls || !group || !name) return alert("빈칸을 채워줘!");

        currentGroup.cls = cls;
        currentGroup.group = group;
        currentGroup.name = name;

        document.getElementById('display-cls').innerText = cls;
        document.getElementById('display-group').innerText = group;
        document.getElementById('screen-login').classList.remove('active');
        document.getElementById('screen-main').classList.add('active');
        
        saveData();
        renderMissions();
    };

    function renderMissions() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        MISSIONS.forEach((m, i) => {
            const isDone = currentGroup.stamps[i];
            grid.innerHTML += `
                <div onclick="openModal(${i})" class="mission-card bg-white p-6 rounded-[2rem] shadow-lg border-b-4 ${isDone ? 'border-rose-500 bg-rose-50' : 'border-slate-100'} flex items-center gap-5">
                    <div class="w-16 h-16 flex items-center justify-center text-4xl bg-slate-50 rounded-2xl ${isDone ? 'bg-white' : ''}">${m.emoji}</div>
                    <div class="flex-1">
                        <h4 class="font-black text-xl text-slate-700">${i+1}. ${m.title}</h4>
                        <p class="text-xs ${isDone ? 'text-rose-500 font-black' : 'text-slate-300 font-bold'} uppercase tracking-widest">${isDone ? 'Mission Clear' : 'In Progress'}</p>
                    </div>
                    <div class="w-10 h-10 rounded-full border-4 ${isDone ? 'bg-rose-500 border-rose-200' : 'border-slate-50'} shadow-inner"></div>
                </div>`;
        });
        document.getElementById('stamp-count').innerText = Object.keys(currentGroup.stamps).length;
    }

    window.openModal = (idx) => {
        currentMissionIdx = idx;
        const m = MISSIONS[idx];
        document.getElementById('modal-title').innerText = m.title;
        document.getElementById('modal-desc').innerText = m.desc;
        document.getElementById('modal-color').innerText = m.emoji;
        document.getElementById('input-answer').value = currentGroup.answers[idx] || '';
        document.getElementById('modal-keywords').innerHTML = m.keywords.map(k => `<span class="bg-rose-100 text-rose-500 text-[11px] px-3 py-1.5 rounded-full font-black">#${k}</span>`).join('');
        document.getElementById('modal-mission').classList.remove('hidden');
    };

    window.closeModal = () => {
        document.getElementById('modal-mission').classList.add('hidden');
    };

    document.getElementById('btn-complete').onclick = async () => {
        const answer = document.getElementById('input-answer').value;
        if(!answer.trim()) return alert("기록을 적어줘!");
        currentGroup.stamps[currentMissionIdx] = true;
        currentGroup.answers[currentMissionIdx] = answer;
        await saveData();
        renderMissions();
        closeModal();
    };

    async function saveData() {
        const docId = `${currentGroup.cls}_${currentGroup.group}`;
        const docRef = doc(db, "artifacts", "seoulland-app", "public", "data", "groups", docId);
        await setDoc(docRef, currentGroup);
    }
</script>
</body>
</html>
