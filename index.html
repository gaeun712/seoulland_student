<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울랜드 과학 탐험대</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff1f2; }
        .font-jua { font-family: 'Jua', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; }
        .mission-card.completed { border-color: #f43f5e; background-color: #fff1f2; }
    </style>
</head>
<body class="text-slate-800">

    <div id="screen-login" class="screen active min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-md border-4 border-rose-100">
            <h1 class="font-jua text-4xl text-rose-500 text-center mb-8">🎡 서울랜드<br>과학 탐험대</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-rose-400 mb-1 ml-1">몇 반이야? 👀</label>
                    <input type="text" id="input-cls" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-rose-300 outline-none" placeholder="예: 1반">
                </div>
                <div>
                    <label class="block text-sm font-bold text-rose-400 mb-1 ml-1">모둠 이름 ⚡</label>
                    <input type="text" id="input-group" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-rose-300 outline-none" placeholder="예: 무적과학팀">
                </div>
                <div>
                    <label class="block text-sm font-bold text-rose-400 mb-1 ml-1">기록 대표자 이름 ✍️</label>
                    <input type="text" id="input-name" class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 focus:border-rose-300 outline-none" placeholder="이름을 적어줘">
                </div>
                <button id="btn-start" disabled class="w-full bg-slate-300 text-white font-jua text-2xl py-4 rounded-2xl shadow-lg mt-4 transition-all">
                    연결 중...
                </button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen min-h-screen p-4">
        <header class="bg-white rounded-2xl p-4 shadow-sm mb-6 flex justify-between items-center">
            <div>
                <span id="display-cls" class="text-xs font-bold text-rose-500"></span>
                <h2 id="display-group" class="font-jua text-2xl"></h2>
            </div>
            <div class="text-right">
                <span class="text-xs font-bold text-slate-400">획득한 도장</span>
                <p class="font-jua text-2xl text-rose-500"><span id="stamp-count">0</span> / 9</p>
            </div>
        </header>

        <div id="mission-grid" class="grid grid-cols-1 gap-4 mb-20"></div>
    </div>

    <div id="modal-mission" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] overflow-hidden shadow-2xl">
            <div id="modal-color" class="h-28 flex items-center justify-center text-5xl bg-rose-50"></div>
            <div class="p-6">
                <h3 id="modal-title" class="font-jua text-3xl mb-2"></h3>
                <div class="bg-slate-50 p-4 rounded-xl mb-4 text-sm leading-relaxed text-slate-600 border-l-4 border-rose-400">
                    <p id="modal-desc"></p>
                </div>
                <div id="modal-keywords" class="flex flex-wrap gap-2 mb-6"></div>
                
                <div class="bg-rose-50 p-4 rounded-xl mb-6">
                    <label class="block text-sm font-bold text-rose-500 mb-2">📝 탐험 기록 남기기</label>
                    <textarea id="input-answer" class="w-full rounded-lg border-none focus:ring-2 focus:ring-rose-300 p-3 text-sm outline-none" rows="3" placeholder="새롭게 알게 된 점이나 느낌을 적어줘!"></textarea>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400">닫기</button>
                    <button id="btn-complete" class="flex-[2] bg-rose-500 text-white font-jua text-xl py-4 rounded-xl shadow-lg active:scale-95 transition-transform">도장 찍기!</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqe59Dh5OjerwcK87Mp_HPH8MGsON0icE",
        authDomain: "seoulland-f090b.firebaseapp.com",
        projectId: "seoulland-f090b",
        storageBucket: "seoulland-f090b.firebasestorage.app",
        messagingSenderId: "675549898278",
        appId: "1:675549898278:web:d3dc82eea8688d990be8e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 선생님이 작성하신 데이터 적용
    const MISSIONS = [
        { 
            title: "블랙홀 2000", emoji: "🎢", 
            desc: "높은 곳에 있는 물체는 아래로 내려올 수 있는 능력, 즉 '위치에너지'를 가지고 있어. 롤러코스터가 내려오면서 이 위치에너지가 빠르게 달리는 힘인 '운동에너지'로 바뀌는 거야. 그래서 가장 낮은 지점에서 속도가 제일 빨라. 모터 없이도 처음 높이 하나로 끝까지 달릴 수 있는 이유가 바로 이거야.",
            keywords: ["위치에너지", "운동에너지", "에너지 전환"]
        },
        { 
            title: "은하열차 888", emoji: "🚀", 
            desc: "물체는 원래 하던 방향으로 계속 가려는 성질이 있는데, 이걸 '관성'이라고 해. 빠르게 달리는 열차 안의 내 몸도 앞으로 계속 나아가려 하는데, 루프에서는 그 힘이 나를 좌석(원의 중심 방향) 쪽으로 눌러줘. 이렇게 원을 그리며 돌 때 중심 방향으로 당기는 힘을 '구심력'이라고 해. 속도가 충분하면 이 구심력이 중력보다 커서 뒤집혀도 안 떨어지는 거야.",
            keywords: ["관성", "구심력"]
        },
        { 
            title: "킹바이킹", emoji: "⚓", 
            desc: "진자(줄에 매달려 흔들리는 물체)는 크게 흔들리든 작게 흔들리든 한 번 왕복하는 시간이 거의 같아. 이걸 '등시성'이라고 해. 왕복 시간은 줄의 길이에만 달려 있거든. 갈릴레오가 교회 천장 램프를 보고 발견한 이 원리로 나중에 진자시계가 만들어졌어. 바이킹에서 조용히 왕복 시간을 세어보면 처음이랑 끝이 비슷하다는 걸 느낄 수 있어!",
            keywords: ["진자운동", "주기", "등시성"]
        },
        { 
            title: "급류타기", emoji: "💦", 
            desc: "움직이는 물체는 무거울수록, 빠를수록 충돌할 때 더 큰 힘을 만들어. 사람이 많이 탈수록 보트가 더 무거워지고, 무거울수록 더 빠르게 내려와. 그 보트가 물과 부딪힐 때 물을 더 세게 밀어내는 거야. 힘이 클수록 물도 더 멀리 튀는 건 당연하겠지? 앞자리에 앉을수록 물을 정면으로 맞는 이유도 같은 원리야.",
            keywords: ["중력", "무게", "힘"]
        },
        { 
            title: "샷드롭", emoji: "🗼", 
            desc: "지구는 모든 물체를 아래로 당기는데, 이 힘이 '중력'이야. 낙하하는 동안 나도, 발판도, 탑승 기구도 모두 똑같이 중력을 받아서 함께 떨어지고 있어. 이렇게 중력만 받으며 떨어지는 걸 '자유낙하'라고 해. 이 순간 발판이 내 발을 받쳐주는 힘이 사라지면서 몸이 둥둥 뜨는 것처럼 느껴지는 거야. 우주정거장도 지구를 향해 자유낙하 중이라서 우주비행사들이 무중력을 경험하는 거야.",
            keywords: ["중력", "자유낙하", "무중력"]
        },
        { 
            title: "엑스플라이어", emoji: "🌀", 
            desc: "관성 때문에 내 몸은 원래 직선으로 쭉 나아가고 싶어 해. 그런데 줄이 나를 중심 쪽으로 잡아당기니까 어쩔 수 없이 원을 그리게 되는 거야. 이때 중심 방향으로 당기는 힘이 '구심력'이고, 빠를수록 이 힘이 더 강하게 필요해. 내 몸이 바깥으로 쏠리는 느낌은 직선으로 가려는 관성 때문이야. 회전이 빠를수록 줄이 더 기울어지는 것도 이 때문이야.",
            keywords: ["관성", "구심력", "원운동"]
        },
        { 
            title: "앨리스 원더하우스", emoji: "🃏", 
            desc: "눈은 빛을 받아들이는 역할만 해. 실제로 '본다'는 건 뇌가 그 정보를 해석하는 거야. 뇌는 과거 경험을 바탕으로 '이럴 거야'라고 예측해서 해석하는데, 착시 체험관은 그 예측을 의도적으로 빗나가도록 설계되어 있어. 빛이 반사되거나 굴절되는 방향을 교란시켜서 뇌가 엉뚱한 결론을 내리게 만드는 거야. 틀린 건 눈이 아니라 뇌의 해석이야.",
            keywords: ["빛의 반사", "착시", "시각 처리"]
        },
        { 
            title: "쥬라기랜드", emoji: "🦖", 
            desc: "약 6600만 년 전 소행성 충돌로 급격한 기후 변화가 일어나면서 대부분의 공룡이 멸종했어. 하지만 깃털 달린 수각류 공룡 일부가 살아남아서 오늘날의 새로 진화했어. 오랜 시간 동안 환경에 적응하며 생김새와 기능이 조금씩 변해가는 것을 '진화'라고 해. 화석은 그 진화의 흔적을 기록한 증거야. 지구에 다양한 생물이 존재하는 것 자체가 수억 년에 걸친 진화의 결과야.",
            keywords: ["화석", "멸종", "진화", "생물다양성"]
        },
        { 
            title: "기상 관측가", emoji: "☁️", 
            desc: "태양에서 오는 열은 '복사열'이라는 방식으로 전달돼. 어두운 색일수록 이 복사열을 잘 흡수하고, 밝은 색일수록 반사해. 아스팔트는 어두운 색이라 열을 많이 흡수하고, 잔디는 수분이 증발하면서 열을 식혀줘. 도시에 아스팔트와 콘크리트가 많아지면 열이 더 많이 흡수·저장되면서 도시 전체 온도가 주변보다 높아지는데, 이걸 '열섬 효과'라고 해.",
            keywords: ["복사열", "열흡수", "열섬 효과"]
        }
    ];

    let currentGroup = { cls: '', group: '', name: '', stamps: {}, answers: {} };
    let currentMissionIdx = null;

    signInAnonymously(auth).then(() => {
        const btn = document.getElementById('btn-start');
        btn.disabled = false;
        btn.innerText = "탐험 시작하기! 🚀";
        btn.classList.replace('bg-slate-300', 'bg-rose-500');
    }).catch(err => {
        document.getElementById('btn-start').innerText = "서버 연결 대기 중...";
    });

    document.getElementById('btn-start').onclick = () => {
        const cls = document.getElementById('input-cls').value;
        const group = document.getElementById('input-group').value;
        const name = document.getElementById('input-name').value;

        if(!cls || !group || !name) return alert("빈칸을 모두 채워줘!");

        currentGroup.cls = cls;
        currentGroup.group = group;
        currentGroup.name = name;

        document.getElementById('display-cls').innerText = cls;
        document.getElementById('display-group').innerText = group;
        document.getElementById('screen-login').classList.remove('active');
        document.getElementById('screen-main').classList.add('active');
        
        saveData();
        renderMissions();
    };

    function renderMissions() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = '';
        MISSIONS.forEach((m, i) => {
            const isDone = currentGroup.stamps[i];
            grid.innerHTML += `
                <div onclick="openModal(${i})" class="mission-card bg-white p-5 rounded-2xl shadow-sm border-2 ${isDone ? 'border-rose-400 bg-rose-50' : 'border-white'} flex items-center gap-4 active:scale-95 transition-all">
                    <div class="text-4xl">${m.emoji}</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-lg text-slate-700">${i+1}. ${m.title}</h4>
                        <p class="text-xs ${isDone ? 'text-rose-500 font-bold' : 'text-slate-400'}">${isDone ? '✅ 미션 완료!' : '미션 진행 중...'}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full border-2 ${isDone ? 'bg-rose-500 border-rose-500' : 'border-slate-100'}"></div>
                </div>`;
        });
        document.getElementById('stamp-count').innerText = Object.keys(currentGroup.stamps).length;
    }

    window.openModal = (idx) => {
        currentMissionIdx = idx;
        const m = MISSIONS[idx];
        document.getElementById('modal-title').innerText = m.title;
        document.getElementById('modal-desc').innerText = m.desc;
        document.getElementById('modal-color').innerText = m.emoji;
        document.getElementById('input-answer').value = currentGroup.answers[idx] || '';
        
        // 키워드 표시
        const keyBox = document.getElementById('modal-keywords');
        keyBox.innerHTML = m.keywords.map(k => `<span class="bg-rose-100 text-rose-600 text-[10px] px-2 py-1 rounded-full font-bold">#${k}</span>`).join('');
        
        document.getElementById('modal-mission').classList.remove('hidden');
    };

    window.closeModal = () => {
        document.getElementById('modal-mission').classList.add('hidden');
    };

    document.getElementById('btn-complete').onclick = async () => {
        const answer = document.getElementById('input-answer').value;
        if(!answer.trim()) return alert("기록을 남겨야 도장을 찍을 수 있어!");

        currentGroup.stamps[currentMissionIdx] = true;
        currentGroup.answers[currentMissionIdx] = answer;
        
        await saveData();
        renderMissions();
        closeModal();
    };

    async function saveData() {
        const docId = `${currentGroup.cls}_${currentGroup.group}`;
        const docRef = doc(db, "artifacts", "seoulland-app", "public", "data", "groups", docId);
        await setDoc(docRef, currentGroup);
    }
</script>
</body>
</html>
